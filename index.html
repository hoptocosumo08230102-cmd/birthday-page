<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Page</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --pink: #ff8fb1;
      --pink-soft: #ffd6e2;
      --purple: #d7b6ff;
      --blue: #b8d7ff;
      --yellow: #ffe7a3;
      --mint: #c8ffd8;
      --text: #4f415a;
      --sub: #6d6278;
      --shadow: 0 18px 50px rgba(90, 63, 120, 0.18);
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.34) 0 5px, transparent 6px),
        radial-gradient(circle at 84% 14%, rgba(255,255,255,0.25) 0 6px, transparent 7px),
        radial-gradient(circle at 18% 82%, rgba(255,255,255,0.28) 0 7px, transparent 8px),
        radial-gradient(circle at 90% 78%, rgba(255,255,255,0.22) 0 5px, transparent 6px),
        linear-gradient(135deg, #ffd6e2 0%, #e8cbff 38%, #cfe0ff 72%, #fff0ba 100%);
    }

    .aurora {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      filter: blur(30px);
      opacity: 0.45;
    }

    .aurora span {
      position: absolute;
      border-radius: 999px;
      animation: drift 14s ease-in-out infinite;
    }

    .aurora span:nth-child(1) {
      width: 340px;
      height: 340px;
      left: 8%;
      top: 10%;
      background: rgba(255, 158, 195, 0.42);
    }

    .aurora span:nth-child(2) {
      width: 420px;
      height: 420px;
      right: 4%;
      top: 18%;
      background: rgba(167, 202, 255, 0.36);
      animation-delay: 2.5s;
    }

    .aurora span:nth-child(3) {
      width: 360px;
      height: 360px;
      left: 30%;
      bottom: -4%;
      background: rgba(255, 240, 168, 0.30);
      animation-delay: 5s;
    }

    @keyframes drift {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(20px, -20px) scale(1.08);
      }
    }

    .bg-quote {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .quote {
      position: absolute;
      white-space: nowrap;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.14);
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.22);
      animation: quoteFloat linear infinite;
      user-select: none;
    }

    .quote.q1 {
      top: 12%;
      left: -10%;
      font-size: clamp(28px, 4vw, 54px);
      transform: rotate(-12deg);
      animation-duration: 18s;
    }

    .quote.q2 {
      top: 42%;
      right: -10%;
      font-size: clamp(34px, 5vw, 68px);
      transform: rotate(-10deg);
      animation-duration: 24s;
      animation-direction: reverse;
      color: rgba(255, 255, 255, 0.12);
    }

    .quote.q3 {
      bottom: 12%;
      left: -8%;
      font-size: clamp(24px, 3.6vw, 48px);
      transform: rotate(-8deg);
      animation-duration: 21s;
      color: rgba(255, 255, 255, 0.10);
    }

    @keyframes quoteFloat {
      0% {
        transform: translateX(0) rotate(-12deg);
      }
      50% {
        transform: translateX(40px) translateY(-8px) rotate(-10deg);
      }
      100% {
        transform: translateX(0) rotate(-12deg);
      }
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 12px rgba(255,255,255,0.8);
      animation: twinkle 4s ease-in-out infinite;
      opacity: 0.6;
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.4);
        opacity: 0.2;
      }
      50% {
        transform: scale(1.2);
        opacity: 0.9;
      }
    }

    .balloons {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .balloon {
      position: absolute;
      bottom: -160px;
      border-radius: 50% 50% 48% 52%;
      opacity: 0.9;
      animation: rise linear infinite;
      box-shadow: inset -10px -16px 24px rgba(255,255,255,0.18);
    }

    .balloon::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 14px;
      height: 12px;
      background: inherit;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      transform: translateX(-50%);
      opacity: 0.9;
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 4px);
      width: 2px;
      height: 90px;
      background: rgba(120, 120, 120, 0.42);
      transform: translateX(-50%);
    }

    .b1 {
      left: 6%;
      width: 74px;
      height: 98px;
      background: #ff8fb1;
      animation-duration: 13s;
      animation-delay: 0s;
    }

    .b2 {
      left: 18%;
      width: 58px;
      height: 78px;
      background: #ffd79b;
      animation-duration: 15s;
      animation-delay: 4s;
    }

    .b3 {
      left: 78%;
      width: 78px;
      height: 104px;
      background: #a7caff;
      animation-duration: 14s;
      animation-delay: 2s;
    }

    .b4 {
      left: 88%;
      width: 60px;
      height: 82px;
      background: #c9ffc9;
      animation-duration: 16s;
      animation-delay: 6s;
    }

    .b5 {
      left: 30%;
      width: 54px;
      height: 72px;
      background: #e6c0ff;
      animation-duration: 17s;
      animation-delay: 8s;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
      }
      50% {
        transform: translateY(-55vh) translateX(10px) rotate(5deg);
      }
      100% {
        transform: translateY(-125vh) translateX(-10px) rotate(-5deg);
      }
    }

    .confetti-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 18px;
      opacity: 0.9;
      animation: confettiFall linear infinite;
      transform-origin: center;
      border-radius: 2px;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.95;
      }
      100% {
        transform: translateY(120vh) rotate(720deg);
        opacity: 0.9;
      }
    }

    .card-wrap {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 580px;
    }

    .card-glow {
      position: absolute;
      inset: -8px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0.08));
      filter: blur(18px);
      z-index: 0;
      opacity: 0.85;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.48);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px 24px 24px;
      text-align: center;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.26), transparent 35%),
        radial-gradient(circle at top right, rgba(255,255,255,0.35), transparent 30%);
      pointer-events: none;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, rgba(255, 180, 203, 0.95), rgba(255, 224, 167, 0.95));
      color: #7d3c56;
      font-weight: 800;
      font-size: 13px;
      padding: 9px 16px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(255, 175, 201, 0.22);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0 0 10px;
      line-height: 1.25;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      background: linear-gradient(135deg, #ff6e9f, #9c7bff 55%, #5fa8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--sub);
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .message-box {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 22px;
      padding: 18px 16px;
      margin: 0 auto 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .message {
      margin: 0;
      font-size: 17px;
      line-height: 1.9;
      color: #4e4557;
      font-weight: 600;
    }

    .gift {
      position: relative;
      z-index: 1;
      margin: 16px auto 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 244, 248, 0.95), rgba(255, 248, 214, 0.95));
      color: #6b4e00;
      font-weight: 800;
      font-size: 15px;
      border: 1px solid rgba(255, 216, 118, 0.55);
      box-shadow: 0 8px 20px rgba(255, 216, 118, 0.14);
    }

    .mini-note {
      position: relative;
      z-index: 1;
      margin: 0 0 18px;
      color: #7f738c;
      font-size: 13px;
      font-weight: 700;
    }

    .countdown-wrap {
      position: relative;
      z-index: 1;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .countdown {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.65);
      color: #6f627e;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(110, 98, 126, 0.08);
    }

    .jump-button {
      display: inline-block;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, #ff7ca9, #8f82ff);
      box-shadow: 0 12px 24px rgba(143, 130, 255, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .jump-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(143, 130, 255, 0.28);
    }

    .jump-button:active {
      transform: scale(0.98);
    }

    .footer-note {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      font-size: 12px;
      color: #8a8094;
      font-weight: 600;
    }

    .tap-burst {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
      animation: burst 700ms ease-out forwards;
      box-shadow: 0 0 12px rgba(255,255,255,0.9);
    }

    @keyframes burst {
      0% {
        transform: scale(0.4);
        opacity: 1;
      }
      100% {
        transform: scale(3.6);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 18px 20px;
        border-radius: 24px;
      }

      .message {
        font-size: 15px;
        line-height: 1.8;
      }

      .gift {
        font-size: 14px;
      }

      .quote.q2 {
        top: 48%;
      }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="bg-quote">
    <div class="quote q1">今日が人生で一番若い日！</div>
    <div class="quote q2">今日が人生で一番若い日！</div>
    <div class="quote q3">今日が人生で一番若い日！</div>
  </div>

  <div class="sparkles" id="sparkles"></div>

  <div class="balloons">
    <div class="balloon b1"></div>
    <div class="balloon b2"></div>
    <div class="balloon b3"></div>
    <div class="balloon b4"></div>
    <div class="balloon b5"></div>
  </div>

  <div class="confetti-layer" id="confetti-layer"></div>

  <main class="card-wrap">
    <div class="card-glow"></div>

    <section class="card">
      <div class="top-badge">🎉 HAPPY BIRTHDAY 🎉</div>

      <h1 class="title">今日で私は25歳になりました！</h1>
      <p class="subtitle">Thanks for scanning this QR code ✨</p>

      <div class="message-box">
        <p class="message">
          リベの皆様、<br>
          いつもありがとうございます。<br><br>
          今日が人生で一番若い日！<br>
          BBQ、皆で楽しみましょー！
        </p>
      </div>

      <div class="gift">
        🎁 誕生日プレゼント（お菓子）配布中です！<br>
        よかったら受け取ってください
      </div>

      <p class="mini-note">使う力、発揮中。</p>

      <div class="countdown-wrap">
        <div class="countdown" id="countdown">10秒後にプロフィールへ移動します</div>
        <a class="jump-button" id="jumpButton" href="https://libecity.com/user_profile/4IiMRzqokLM1LSfIcQuY5yRU37z2">今すぐプロフィールへ</a>
      </div>
    </section>
  </main>

  <script>
    const targetUrl = "https://libecity.com/user_profile/4IiMRzqokLM1LSfIcQuY5yRU37z2";

    document.getElementById("jumpButton").href = targetUrl;

    const sparkleLayer = document.getElementById("sparkles");
    for (let i = 0; i < 24; i++) {
      const s = document.createElement("span");
      s.className = "sparkle";
      s.style.left = Math.random() * 100 + "%";
      s.style.top = Math.random() * 100 + "%";
      s.style.animationDelay = (Math.random() * 4).toFixed(2) + "s";
      s.style.animationDuration = (3 + Math.random() * 3).toFixed(2) + "s";
      s.style.width = s.style.height = (6 + Math.random() * 8).toFixed(0) + "px";
      sparkleLayer.appendChild(s);
    }

    const confettiLayer = document.getElementById("confetti-layer");
    const confettiColors = ["#ff8fb1", "#ffd79b", "#a7caff", "#c9ffc9", "#e6c0ff", "#fff2a8"];

    for (let i = 0; i < 42; i++) {
      const c = document.createElement("span");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "%";
      c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      c.style.animationDuration = (5 + Math.random() * 5).toFixed(2) + "s";
      c.style.animationDelay = (Math.random() * 6).toFixed(2) + "s";
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      c.style.width = (8 + Math.random() * 6).toFixed(0) + "px";
      c.style.height = (10 + Math.random() * 10).toFixed(0) + "px";
      confettiLayer.appendChild(c);
    }

    let seconds = 10;
    const countdown = document.getElementById("countdown");

    const timer = setInterval(() => {
      seconds--;
      if (seconds > 0) {
        countdown.textContent = `${seconds}秒後にプロフィールへ移動します`;
      } else {
        clearInterval(timer);
        countdown.textContent = "プロフィールへ移動します…";
        window.location.href = targetUrl;
      }
    }, 1000);

    function createBurst(x, y) {
      const burstColors = ["#ffffff", "#ffd79b", "#ffb3cf", "#cfe0ff", "#e6c0ff"];
      for (let i = 0; i < 8; i++) {
        const dot = document.createElement("span");
        dot.className = "tap-burst";
        dot.style.left = x + "px";
        dot.style.top = y + "px";
        dot.style.background = burstColors[Math.floor(Math.random() * burstColors.length)];
        dot.style.transform = `translate(-50%, -50%) scale(${0.5 + Math.random()})`;
        document.body.appendChild(dot);

        const angle = (Math.PI * 2 * i) / 8;
        const distance = 20 + Math.random() * 25;

        dot.animate(
          [
            { transform: "translate(-50%, -50%) scale(0.6)", opacity: 1 },
            {
              transform: `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px)) scale(2.2)`,
              opacity: 0
            }
          ],
          {
            duration: 650,
            easing: "ease-out",
            fill: "forwards"
          }
        );

        setTimeout(() => dot.remove(), 700);
      }
    }

    document.addEventListener("click", (e) => {
      createBurst(e.clientX, e.clientY);
    });

    document.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      if (touch) createBurst(touch.clientX, touch.clientY);
    }, { passive: true });
  </script>
</body>
</html>
