<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #4f4a5a;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.75) 0 6px, transparent 7px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.55) 0 5px, transparent 6px),
        radial-gradient(circle at 60% 80%, rgba(255,255,255,0.6) 0 7px, transparent 8px),
        linear-gradient(135deg, #ffd8ea, #e7dcff, #d9f0ff, #fff1ba);
      background-size: auto, auto, auto, 250% 250%;
      animation: bgMove 10s ease infinite;
      position: relative;
      padding: 24px 16px;
    }

    @keyframes bgMove {
      0% { background-position: 0 0, 0 0, 0 0, 0% 50%; }
      50% { background-position: 0 0, 0 0, 0 0, 100% 50%; }
      100% { background-position: 0 0, 0 0, 0 0, 0% 50%; }
    }

    .balloon {
      position: absolute;
      bottom: -160px;
      width: 90px;
      height: 115px;
      border-radius: 50%;
      opacity: 0.5;
      filter: blur(0.2px);
      animation: floatUp linear infinite;
      z-index: 0;
    }

    .balloon::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -55px;
      width: 2px;
      height: 60px;
      background: rgba(120, 120, 120, 0.35);
      transform: translateX(-50%);
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 14px;
      height: 14px;
      background: inherit;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      transform: translateX(-50%);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-55vh) translateX(10px);
      }
      100% {
        transform: translateY(-120vh) translateX(-8px);
      }
    }

    .b1 {
      left: 5%;
      background: rgba(255, 122, 162, 0.55);
      animation-duration: 15s;
    }

    .b2 {
      left: 20%;
      width: 70px;
      height: 92px;
      background: rgba(255, 216, 107, 0.55);
      animation-duration: 18s;
      animation-delay: 2s;
    }

    .b3 {
      right: 10%;
      background: rgba(130, 175, 255, 0.5);
      animation-duration: 17s;
      animation-delay: 1s;
    }

    .b4 {
      right: 2%;
      width: 75px;
      height: 96px;
      background: rgba(145, 235, 178, 0.5);
      animation-duration: 20s;
      animation-delay: 4s;
    }

    .b5 {
      left: 38%;
      width: 60px;
      height: 78px;
      background: rgba(228, 177, 255, 0.45);
      animation-duration: 16s;
      animation-delay: 5s;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 640px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 34px;
      box-shadow:
        0 18px 45px rgba(125, 107, 162, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      padding: 28px 20px 32px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 11px 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffb8d1, #ffdca8);
      color: #7d4560;
      font-size: 1rem;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(255, 170, 196, 0.28);
      margin-bottom: 22px;
      letter-spacing: 0.03em;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.3rem);
      line-height: 1.3;
      font-weight: 900;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #ff63ae, #a06dff, #6f9cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 18px rgba(175, 122, 255, 0.14);
    }

    .sub {
      font-size: clamp(1rem, 3.7vw, 1.55rem);
      color: #746d7d;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .catch {
      font-size: clamp(1.25rem, 5vw, 2rem);
      font-weight: 900;
      line-height: 1.5;
      margin: 18px auto 24px;
      background: linear-gradient(90deg, #ff5fa2, #a86cff, #ff9c7b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glowText 2.2s ease-in-out infinite;
    }

    @keyframes glowText {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 0 rgba(255, 125, 191, 0));
      }
      50% {
        transform: scale(1.03);
        filter: drop-shadow(0 4px 10px rgba(255, 125, 191, 0.25));
      }
    }

    .message-box {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 26px;
      padding: 28px 18px;
      font-size: clamp(1.05rem, 3.9vw, 1.6rem);
      line-height: 1.9;
      font-weight: 700;
      color: #514d58;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      margin-bottom: 22px;
    }

    .gift-box {
      background: linear-gradient(180deg, rgba(255,249,221,0.96), rgba(255,244,205,0.92));
      border: 1.5px solid rgba(235, 205, 112, 0.6);
      color: #8a6914;
      border-radius: 24px;
      padding: 18px 16px;
      margin-bottom: 22px;
      box-shadow: 0 8px 20px rgba(220, 193, 100, 0.12);
    }

    .gift-box .gift-main {
      font-size: clamp(1.08rem, 4vw, 1.55rem);
      font-weight: 900;
      line-height: 1.6;
      margin-bottom: 4px;
    }

    .gift-box .gift-sub {
      font-size: clamp(0.96rem, 3.3vw, 1.18rem);
      font-weight: 700;
      line-height: 1.6;
    }

    .small-note {
      font-size: clamp(0.95rem, 3.4vw, 1.2rem);
      color: #7f7888;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .countdown {
      display: inline-block;
      min-width: 270px;
      padding: 16px 24px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      color: #6d6677;
      font-size: clamp(1rem, 3.6vw, 1.4rem);
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 17px 34px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff72b2, #8f6dff);
      color: white;
      font-weight: 900;
      font-size: clamp(1.05rem, 4vw, 1.45rem);
      box-shadow: 0 10px 24px rgba(162, 104, 255, 0.28);
      transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    }

    .btn:hover,
    .btn:active {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 14px 28px rgba(162, 104, 255, 0.34);
      filter: brightness(1.03);
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 14px;
      height: 8px;
      border-radius: 3px;
      opacity: 0.9;
      animation: confettiFall linear infinite;
      z-index: 1;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(120vh) rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .container {
        border-radius: 28px;
        padding: 22px 14px 28px;
      }

      .message-box {
        padding: 22px 14px;
      }

      .countdown {
        min-width: auto;
        width: 100%;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="confetti" style="left: 6%; background:#ff8fb6; animation-duration:8s;"></div>
  <div class="confetti" style="left: 14%; background:#ffd86b; animation-duration:10s; animation-delay:1s;"></div>
  <div class="confetti" style="left: 28%; background:#9d87ff; animation-duration:7.5s; animation-delay:2s;"></div>
  <div class="confetti" style="left: 43%; background:#86d8ff; animation-duration:9s; animation-delay:0.5s;"></div>
  <div class="confetti" style="left: 56%; background:#ffb36b; animation-duration:8.8s; animation-delay:1.5s;"></div>
  <div class="confetti" style="left: 69%; background:#b1f1a8; animation-duration:10.5s; animation-delay:2.5s;"></div>
  <div class="confetti" style="left: 82%; background:#f5a4ff; animation-duration:7.8s; animation-delay:1.2s;"></div>
  <div class="confetti" style="left: 92%; background:#ffe08a; animation-duration:9.2s; animation-delay:2.8s;"></div>

  <div class="balloon b1"></div>
  <div class="balloon b2"></div>
  <div class="balloon b3"></div>
  <div class="balloon b4"></div>
  <div class="balloon b5"></div>

  <main class="container">
    <div class="badge">🎉 HAPPY BIRTHDAY 🎉</div>

    <h1>今日で私は25歳になりました！</h1>

    <p class="sub">Thanks for scanning this QR code ✨</p>

    <p class="catch">今日が人生で一番若い日！</p>

    <section class="message-box">
      リベの皆様、<br>
      いつもありがとうございます。<br><br>
      BBQ、皆で楽しみましょー！
    </section>

    <section class="gift-box">
      <div class="gift-main">🎁 誕生日プレゼント（お菓子）配布中！</div>
      <div class="gift-sub">よかったらぜひ受け取ってください✨</div>
    </section>

    <p class="small-note">使う力、発揮中。</p>

    <div class="countdown">
      <span id="count">9</span>秒後にプロフィールへ移動します
    </div>

    <br>

    <a
      id="profileBtn"
      class="btn"
      href="https://libecity.com/user_profile/4IiMRzqokLM1LSfIcQuY5yRU37z2"
      target="_blank"
      rel="noopener noreferrer"
    >
      今すぐプロフィールへ
    </a>
  </main>

  <script>
    const profileUrl = "https://libecity.com/user_profile/4IiMRzqokLM1LSfIcQuY5yRU37z2";

    const profileBtn = document.getElementById("profileBtn");
    profileBtn.href = profileUrl;

    let timeLeft = 9;
    const countEl = document.getElementById("count");

    const timer = setInterval(() => {
      timeLeft--;
      countEl.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = profileUrl;
      }
    }, 1000);
  </script>
</body>
</html>
